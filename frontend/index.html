<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Google Fonts — preconnect for speed -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />

  <!-- Primary SEO -->
  <title>Squish — Free File Compressor</title>
  <meta name="description" content="Compress PDF, DOCX, JPG, and PNG files in your browser. Private, free, no upload required for files under 10 MB." />
  <link rel="canonical" href="https://usesquish.app" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://usesquish.app" />
  <meta property="og:title" content="Squish — Free File Compressor" />
  <meta property="og:description" content="Compress files privately in your browser. Nothing is uploaded or stored. Supports PDF, JPEG, PNG, and DOCX." />
  <meta property="og:image" content="https://usesquish.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Squish" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Squish — Free File Compressor" />
  <meta name="twitter:description" content="Compress PDF, JPEG, PNG and DOCX files privately — browser-first, always free." />
  <meta name="twitter:image" content="https://usesquish.app/og-image.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#6366f1" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Squish",
    "url": "https://usesquish.app",
    "description": "Privacy-first file compression tool. Compress PDF, DOCX, JPEG and PNG files directly in your browser — files under 10 MB never leave your device.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires a modern web browser with JavaScript enabled",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "featureList": [
      "PDF compression",
      "JPEG compression",
      "PNG compression",
      "DOCX compression",
      "Browser-side processing — files never uploaded",
      "Dark mode support",
      "Before/after image comparison"
    ],
    "creator": {
      "@type": "Organization",
      "name": "Squish"
    }
  }
  </script>

  <!-- Plausible Analytics (privacy-first, no cookies, GDPR compliant) -->
  <script defer data-domain="usesquish.app" src="https://plausible.io/js/script.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
